
name: pytest

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      # Checkout fast_rsm (the main repo)
      - uses: actions/checkout@v3

      # Extract the current branch name (for PRs or pushes)
      - name: Get branch name
        id: branch
        run: echo "branch_name=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT

      # Clone repo2 and repo3 using the same branch
      - name: Clone diffraciton_utils and mapper_c_utils
        run: |
          git clone --branch "${{ steps.branch.outputs.branch_name }}" https://github.com/DiamondLightSource/diffraction_utils/ || \
              git clone https://github.com/DiamondLightSource/diffraction_utils/

          git clone --branch "${{ steps.branch.outputs.branch_name }}" https://github.com/DiamondLightSource/mapper_c_utils/ || \
              git clone https://github.com/DiamondLightSource/mapper_c_utils/

      # Set up Python
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

          # Install diffraciton_utils and mapper_c_utils in editable mode
          pip install -e diffraciton_utils
          pip install -e mapper_c_utils

          # Install fast_rsm
          pip install -e .

      # Run tests
      - name: Run pytest
        run: pytest
